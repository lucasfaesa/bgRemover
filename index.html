<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222;
      --border: #2a2a2a; --accent: #4f8ef7; --text: #e8e8e8;
      --muted: #666; --green: #4caf7d; --red: #e05c5c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; max-width: 780px;
      margin: 0 auto; padding: 32px 20px 60px;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    #dropzone {
      display: block; border: 2px dashed var(--border); border-radius: 12px;
      padding: 48px 20px; text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; margin-bottom: 16px;
    }
    #dropzone.over, #dropzone:hover { border-color: var(--accent); background: #0f1a2e; }
    .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    #dropzone p { color: var(--muted); font-size: 0.9rem; }
    #dropzone strong { color: var(--text); }
    #fileInput { display: none; }
    .options {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 16px;
      display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap;
    }
    .opt-group { display: flex; flex-direction: column; gap: 6px; }
    .opt-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 7px; padding: 6px 10px;
      font-size: 0.875rem; font-family: inherit; cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--accent); }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] {
      -webkit-appearance: none; width: 140px; height: 4px;
      border-radius: 2px; background: var(--border); outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    #featherVal { font-size: 0.83rem; color: var(--text); min-width: 24px; }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.875rem; cursor: pointer; color: var(--text); white-space: nowrap;
    }
    input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    #modelProgress {
      display: none; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; font-size: 0.875rem;
    }
    .prog-label { color: var(--muted); margin-bottom: 8px; }
    .bar-wrap { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.1s; width: 0%; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 9px 20px; border-radius: 8px; border: none;
      font-size: 0.9rem; cursor: pointer; transition: opacity 0.15s, background 0.15s; font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #3a7de8; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #444; }
    .btn-danger { background: var(--surface2); color: var(--red); border: 1px solid #3d2a2a; }
    .btn-danger:not(:disabled):hover { background: #2e1a1a; border-color: var(--red); }
    .btn-success { background: var(--green); color: #fff; font-weight: 600; border: none; }
    .btn-success:not(:disabled):hover { background: #3a9465; }
    #count { color: var(--muted); font-size: 0.875rem; margin-left: auto; }
    #fileList {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
    }
    .file-item {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; transition: border-color 0.15s;
    }
    .file-item.done  { border-color: #2a3d2e; }
    .file-item.error { border-color: #3d2a2a; }
    .thumb-wrap { position: relative; aspect-ratio: 1; }
    .thumb {
      width: 100%; height: 100%; object-fit: contain; display: block;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
    }
    .file-name {
      font-size: 0.68rem; padding: 5px 6px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .status-badge {
      position: absolute; bottom: 4px; left: 4px;
      font-size: 0.68rem; padding: 2px 6px; border-radius: 10px; white-space: nowrap;
    }
    .status-pending { background: rgba(30,30,30,0.85); color: var(--muted); }
    .status-working { background: rgba(15,25,50,0.9);  color: #7ab3f7; }
    .status-done    { background: rgba(15,35,20,0.9);  color: var(--green); }
    .status-error   { background: rgba(50,20,20,0.9);  color: var(--red); }
    .dl-btn {
      position: absolute; bottom: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%; padding: 0;
      background: rgba(0,0,0,0.65); border: 1px solid var(--accent);
      color: var(--accent); cursor: pointer; font-family: inherit; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
    }
    .dl-btn:hover { background: var(--accent); color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid #7ab3f7; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>Background Remover</h1>
  <p class="sub">Runs entirely in your browser — no uploads, no API key</p>

  <label id="dropzone" for="fileInput">
    <div class="drop-icon">🖼️</div>
    <p><strong>Drop images here</strong> or click to browse</p>
    <p style="margin-top:6px;font-size:0.8rem;">PNG, JPG, WebP · Multiple files OK</p>
    <input type="file" id="fileInput" multiple accept="image/*">
  </label>

  <div class="options">
    <div class="opt-group">
      <div class="opt-label">Model</div>
      <select id="modelSelect">
        <option value="isnet-anime">Anime / Illustrations</option>
        <option value="isnet-general-use">High quality (isnet)</option>
        <option value="u2net">General (u2net)</option>
      </select>
    </div>
    <div class="opt-group">
      <div class="opt-label">Edge Feather</div>
      <div class="slider-row">
        <input type="range" id="feather" min="0" max="3" step="0.5" value="1">
        <span id="featherVal">1.0</span>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-label">&nbsp;</div>
      <label class="checkbox-label">
        <input type="checkbox" id="enhanceCheck">
        Better edge quality (slower)
      </label>
    </div>
  </div>

  <div id="modelProgress">
    <div class="prog-label" id="progLabel">Downloading model…</div>
    <div class="bar-wrap"><div class="bar-fill" id="progBar"></div></div>
  </div>

  <div class="toolbar">
    <button class="btn-primary"   id="processBtn" disabled>Remove Backgrounds</button>
    <button class="btn-secondary" id="zipBtn"     disabled>Download All as ZIP</button>
    <button class="btn-danger"    id="clearBtn"   disabled>Clear List</button>
    <span id="count"></span>
  </div>

  <div id="fileList"></div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module">
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/';
    ort.env.wasm.numThreads = 1;

    const MODEL_BASE = 'https://huggingface.co/lucasfaesa/rembg-models/resolve/main';

    const MODELS = {
      'isnet-anime':       { input: 'img',         output: 'mask',         size: 1024, norm: 'isnet', url: `${MODEL_BASE}/isnet-anime.onnx` },
      'isnet-general-use': { input: 'input_image', output: 'output_image', size: 1024, norm: 'isnet', url: `${MODEL_BASE}/isnet-general-use.onnx` },
      'u2net':             { input: 'input.1',     output: '1959',         size: 320,  norm: 'u2net', url: `${MODEL_BASE}/u2net.onnx` },
    };
    const sessions = {};

    function buildTensor(imageData, size, norm) {
      const d = imageData.data, n = size * size;
      const t = new Float32Array(3 * n);
      if (norm === 'isnet') {
        for (let i = 0; i < n; i++) {
          t[i]       = d[i*4]   / 255 - 0.5;
          t[n+i]     = d[i*4+1] / 255 - 0.5;
          t[2*n+i]   = d[i*4+2] / 255 - 0.5;
        }
      } else {
        const mean = [0.485, 0.456, 0.406], std = [0.229, 0.224, 0.225];
        for (let i = 0; i < n; i++) {
          t[i]       = (d[i*4]   / 255 - mean[0]) / std[0];
          t[n+i]     = (d[i*4+1] / 255 - mean[1]) / std[1];
          t[2*n+i]   = (d[i*4+2] / 255 - mean[2]) / std[2];
        }
      }
      return t;
    }

    async function loadModel(key, onProgress) {
      if (sessions[key]) return sessions[key];
      const resp = await fetch(MODELS[key].url);
      const total = parseInt(resp.headers.get('Content-Length') || '0');
      const reader = resp.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total > 0) onProgress(loaded / total);
      }
      const buf = new Uint8Array(loaded);
      let off = 0;
      for (const c of chunks) { buf.set(c, off); off += c.length; }
      sessions[key] = await ort.InferenceSession.create(buf.buffer, { executionProviders: ['wasm'] });
      return sessions[key];
    }

    async function runModel(file, key, onProgress) {
      const cfg = MODELS[key];
      const session = await loadModel(key, onProgress);

      const img = await createImageBitmap(file);
      const tmp = new OffscreenCanvas(cfg.size, cfg.size);
      tmp.getContext('2d').drawImage(img, 0, 0, cfg.size, cfg.size);
      const imgData = tmp.getContext('2d').getImageData(0, 0, cfg.size, cfg.size);

      const tensor = new ort.Tensor('float32', buildTensor(imgData, cfg.size, cfg.norm), [1, 3, cfg.size, cfg.size]);
      const out = await session.run({ [cfg.input]: tensor });
      const raw = out[cfg.output].data;

      let lo = Infinity, hi = -Infinity;
      const sig = new Float32Array(raw.length);
      for (let i = 0; i < raw.length; i++) {
        sig[i] = 1 / (1 + Math.exp(-raw[i]));
        if (sig[i] < lo) lo = sig[i];
        if (sig[i] > hi) hi = sig[i];
      }
      const range = Math.max(hi - lo, 1e-8);

      const mc = new OffscreenCanvas(cfg.size, cfg.size);
      const mctx = mc.getContext('2d');
      const md = mctx.createImageData(cfg.size, cfg.size);
      for (let i = 0; i < sig.length; i++) {
        const v = Math.round((sig[i] - lo) / range * 255);
        md.data[i*4] = md.data[i*4+1] = md.data[i*4+2] = v;
        md.data[i*4+3] = 255;
      }
      mctx.putImageData(md, 0, 0);

      const rc = new OffscreenCanvas(img.width, img.height);
      const rctx = rc.getContext('2d');
      rctx.drawImage(mc, 0, 0, img.width, img.height);
      const scaled = rctx.getImageData(0, 0, img.width, img.height);
      rctx.drawImage(img, 0, 0);
      const pix = rctx.getImageData(0, 0, img.width, img.height);
      for (let i = 0; i < pix.data.length / 4; i++) pix.data[i*4+3] = scaled.data[i*4];
      rctx.putImageData(pix, 0, 0);
      return rc.convertToBlob({ type: 'image/png' });
    }

    async function refineAlpha(resultBlob, originalFile) {
      const [origBitmap, resBitmap] = await Promise.all([
        createImageBitmap(originalFile),
        createImageBitmap(resultBlob),
      ]);
      const { width, height } = origBitmap;
      const N = width * height;
      const r = 4, eps = 0.01;

      const oc = new OffscreenCanvas(width, height);
      oc.getContext('2d').drawImage(origBitmap, 0, 0);
      const origPix = oc.getContext('2d').getImageData(0, 0, width, height).data;

      const rc = new OffscreenCanvas(width, height);
      rc.getContext('2d').drawImage(resBitmap, 0, 0);
      const resAlpha = rc.getContext('2d').getImageData(0, 0, width, height).data;

      const I = new Float32Array(N), p = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        I[i] = (0.299*origPix[i*4] + 0.587*origPix[i*4+1] + 0.114*origPix[i*4+2]) / 255;
        p[i] = resAlpha[i*4+3] / 255;
      }

      // Box mean via integral image — O(N) per call
      function boxMean(arr) {
        const ii = new Float64Array((width+1) * (height+1));
        for (let y = 0; y < height; y++)
          for (let x = 0; x < width; x++)
            ii[(y+1)*(width+1)+(x+1)] = arr[y*width+x]
              + ii[y*(width+1)+(x+1)] + ii[(y+1)*(width+1)+x] - ii[y*(width+1)+x];
        const out = new Float32Array(N), W = width + 1;
        for (let y = 0; y < height; y++)
          for (let x = 0; x < width; x++) {
            const x1=Math.max(0,x-r), y1=Math.max(0,y-r);
            const x2=Math.min(width-1,x+r), y2=Math.min(height-1,y+r);
            out[y*width+x] = (ii[(y2+1)*W+(x2+1)] - ii[y1*W+(x2+1)]
              - ii[(y2+1)*W+x1] + ii[y1*W+x1]) / ((x2-x1+1)*(y2-y1+1));
          }
        return out;
      }

      const mean_I = boxMean(I), mean_p = boxMean(p);
      const Ip = new Float32Array(N), II = new Float32Array(N);
      for (let i = 0; i < N; i++) { Ip[i] = I[i]*p[i]; II[i] = I[i]*I[i]; }
      const mean_Ip = boxMean(Ip), mean_II = boxMean(II);

      const a = new Float32Array(N), b = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        a[i] = (mean_Ip[i] - mean_I[i]*mean_p[i]) / (mean_II[i] - mean_I[i]*mean_I[i] + eps);
        b[i] = mean_p[i] - a[i]*mean_I[i];
      }
      const mean_a = boxMean(a), mean_b = boxMean(b);

      // Recombine: original RGB + refined alpha
      const outData = new ImageData(width, height);
      for (let i = 0; i < N; i++) {
        outData.data[i*4]   = origPix[i*4];
        outData.data[i*4+1] = origPix[i*4+1];
        outData.data[i*4+2] = origPix[i*4+2];
        outData.data[i*4+3] = Math.max(0, Math.min(255,
          Math.round((mean_a[i]*I[i] + mean_b[i]) * 255)));
      }
      const out = new OffscreenCanvas(width, height);
      out.getContext('2d').putImageData(outData, 0, 0);
      return out.convertToBlob({ type: 'image/png' });
    }

    async function featherAlpha(blob, radius) {
      if (!radius) return blob;
      const img = await createImageBitmap(blob);
      const { width, height } = img;
      const base = new OffscreenCanvas(width, height);
      const bctx = base.getContext('2d');
      bctx.drawImage(img, 0, 0);
      const data = bctx.getImageData(0, 0, width, height);
      const ac = new OffscreenCanvas(width, height);
      const actx = ac.getContext('2d');
      const ad = actx.createImageData(width, height);
      for (let i = 0; i < data.data.length; i += 4) {
        ad.data[i] = ad.data[i+1] = ad.data[i+2] = data.data[i+3];
        ad.data[i+3] = 255;
      }
      actx.putImageData(ad, 0, 0);
      const bc = new OffscreenCanvas(width, height);
      const bctx2 = bc.getContext('2d');
      bctx2.filter = `blur(${radius}px)`;
      bctx2.drawImage(ac, 0, 0);
      const bd = bctx2.getImageData(0, 0, width, height);
      for (let i = 0; i < data.data.length; i += 4) data.data[i+3] = bd.data[i];
      base.getContext('2d').putImageData(data, 0, 0);
      return base.convertToBlob({ type: 'image/png' });
    }

    // UI
    let files = [], results = [], running = false;
    const fileInput     = document.getElementById('fileInput');
    const dropzone      = document.getElementById('dropzone');
    const fileList      = document.getElementById('fileList');
    const processBtn    = document.getElementById('processBtn');
    const zipBtn        = document.getElementById('zipBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const countEl       = document.getElementById('count');
    const modelSelect   = document.getElementById('modelSelect');
    const featherSlider = document.getElementById('feather');
    const featherVal    = document.getElementById('featherVal');
    const enhanceCheck  = document.getElementById('enhanceCheck');
    const modelProg     = document.getElementById('modelProgress');
    const progBar       = document.getElementById('progBar');
    const progLabel     = document.getElementById('progLabel');

    featherSlider.addEventListener('input', () =>
      featherVal.textContent = parseFloat(featherSlider.value).toFixed(1));

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('over'); addFiles([...e.dataTransfer.files]); });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function fmt(b) { return b < 1048576 ? (b/1024).toFixed(0)+' KB' : (b/1048576).toFixed(1)+' MB'; }

    function addFiles(incoming) {
      files = [...files, ...incoming.filter(f => f.type.startsWith('image/'))];
      results = []; renderList(); updateToolbar();
    }

    function renderList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const item = document.createElement('div');
        item.className = 'file-item'; item.id = `item-${i}`;
        item.innerHTML = `
          <div class="thumb-wrap">
            <img class="thumb" src="${url}" id="thumb-${i}">
            <span class="status-badge status-pending" id="status-${i}">–</span>
          </div>
          <div class="file-name" title="${f.name}">${f.name}</div>`;
        fileList.appendChild(item);
      });
    }

    function setStatus(i, type, text) {
      const el = document.getElementById(`status-${i}`);
      if (!el) return;
      el.className = `status-badge status-${type}`;
      if (type === 'working') {
        const pct = text && text.match(/(\d+)%/);
        el.innerHTML = pct ? `${pct[1]}%` : `<span class="spinner"></span>`;
      } else {
        el.innerHTML = type === 'done' ? '✓' : type === 'error' ? '✕' : '–';
      }
    }

    function updateToolbar() {
      processBtn.disabled = files.length === 0 || running;
      clearBtn.disabled   = files.length === 0 || running;
      countEl.textContent = files.length ? `${files.length} image${files.length > 1 ? 's' : ''}` : '';
    }

    processBtn.addEventListener('click', async () => {
      if (running) return;
      running = true; results = []; zipBtn.disabled = true; updateToolbar();
      const key     = modelSelect.value;
      const feather = parseFloat(featherSlider.value);
      const enhance = enhanceCheck.checked;

      for (let i = 0; i < files.length; i++) {
        setStatus(i, 'working', sessions[key] ? 'Processing…' : 'Loading model…');
        try {
          let blob = await runModel(files[i], key, pct => {
            modelProg.style.display = 'block';
            progBar.style.width = (pct * 100) + '%';
            progLabel.textContent = `Downloading model… ${Math.round(pct * 100)}%`;
            setStatus(i, 'working', `Downloading ${Math.round(pct * 100)}%`);
          });
          modelProg.style.display = 'none';
          if (enhance) { setStatus(i, 'working', 'Refining edges…'); blob = await refineAlpha(blob, files[i]); }
          if (feather)  { setStatus(i, 'working', 'Feathering…'); blob = await featherAlpha(blob, feather); }

          const name = files[i].name.replace(/\.[^.]+$/, '.png');
          const url  = URL.createObjectURL(blob);
          results.push({ name, blob, url });
          zipBtn.disabled = false;
          document.getElementById(`thumb-${i}`).src = url;
          document.getElementById(`item-${i}`).classList.add('done');
          setStatus(i, 'done', '✓ Done');
          const dlBtn = document.createElement('button');
          dlBtn.className = 'dl-btn'; dlBtn.textContent = '↓'; dlBtn.title = 'Download';
          dlBtn.onclick = () => Object.assign(document.createElement('a'), { href: url, download: name }).click();
          document.getElementById(`item-${i}`).querySelector('.thumb-wrap').appendChild(dlBtn);
        } catch (err) {
          setStatus(i, 'error', '✕ Error'); console.error(err);
        }
      }
      running = false;
      zipBtn.disabled = results.length === 0;
      if (results.length > 0) zipBtn.className = 'btn-success';
      updateToolbar();
    });

    zipBtn.addEventListener('click', async () => {
      const zip = new JSZip();
      for (const { name, blob } of results) zip.file(name, blob);
      const out = await zip.generateAsync({ type: 'blob' });
      Object.assign(document.createElement('a'), { href: URL.createObjectURL(out), download: 'removed-backgrounds.zip' }).click();
    });

    clearBtn.addEventListener('click', () => {
      files = []; results = []; fileList.innerHTML = '';
      zipBtn.disabled = true; zipBtn.className = 'btn-secondary';
      updateToolbar();
    });
  </script>
</body>
</html>
