<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #666;
      --green: #4caf7d;
      --red: #e05c5c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    nav { margin-bottom: 32px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    /* Drop zone */
    #dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 20px;
    }
    #dropzone.over, #dropzone:hover { border-color: var(--accent); background: #0f1a2e; }
    #dropzone .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    #dropzone p { color: var(--muted); font-size: 0.9rem; }
    #dropzone strong { color: var(--text); }
    #fileInput { display: none; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #3a7de8; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #444; }
    #count { color: var(--muted); font-size: 0.875rem; margin-left: auto; }

    /* Model progress (first run) */
    #modelProgress {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.875rem;
    }
    #modelProgress .label { color: var(--muted); margin-bottom: 8px; }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.2s;
      width: 0%;
    }

    /* File list */
    #fileList { display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .file-item.done { border-color: #2a3d2e; }
    .file-item.error { border-color: #3d2a2a; }
    .thumb {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 6px;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
      flex-shrink: 0;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
    .status-badge {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-pending  { background: #252525; color: var(--muted); }
    .status-working  { background: #1a2a3a; color: #7ab3f7; }
    .status-done     { background: #1a2e1f; color: var(--green); }
    .status-error    { background: #2e1a1a; color: var(--red); }
    .dl-btn {
      padding: 5px 12px;
      font-size: 0.78rem;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    .dl-btn:hover { border-color: var(--accent); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #7ab3f7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <h1>Background Remover</h1>
  <p class="sub">Runs entirely in your browser — no uploads, no API key</p>

  <div id="dropzone">
    <div class="drop-icon">🖼️</div>
    <p><strong>Drop images here</strong> or click to browse</p>
    <p style="margin-top:6px;font-size:0.8rem;">PNG, JPG, WebP · Multiple files OK</p>
    <input type="file" id="fileInput" multiple accept="image/*">
  </div>

  <div id="modelProgress">
    <div class="label" id="modelLabel">Downloading model (first run only)…</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="modelBar"></div></div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" id="processBtn" disabled>Remove Backgrounds</button>
    <button class="btn-secondary" id="zipBtn" disabled>Download All as ZIP</button>
    <button class="btn-ghost" id="clearBtn" disabled>Clear</button>
    <span id="count"></span>
  </div>

  <div id="fileList"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/background-removal.browser.esm.js';

    const CONFIG = {
      publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/',
      model: 'medium',
      output: { format: 'image/png', quality: 1 },
    };

    let files = [];
    let results = [];   // { name, blob, url }[]
    let running = false;
    let modelReady = false;

    const dropzone   = document.getElementById('dropzone');
    const fileInput  = document.getElementById('fileInput');
    const fileList   = document.getElementById('fileList');
    const processBtn = document.getElementById('processBtn');
    const zipBtn     = document.getElementById('zipBtn');
    const clearBtn   = document.getElementById('clearBtn');
    const countEl    = document.getElementById('count');
    const modelProg  = document.getElementById('modelProgress');
    const modelBar   = document.getElementById('modelBar');
    const modelLabel = document.getElementById('modelLabel');

    // Drop zone
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('over');
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function fmt(bytes) {
      return bytes < 1024 * 1024 ? (bytes / 1024).toFixed(0) + ' KB' : (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function addFiles(incoming) {
      const imgs = incoming.filter(f => f.type.startsWith('image/'));
      files = [...files, ...imgs];
      results = [];
      renderList();
      updateToolbar();
    }

    function renderList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const item = document.createElement('div');
        item.className = 'file-item';
        item.id = `item-${i}`;
        item.innerHTML = `
          <img class="thumb" src="${url}" id="thumb-${i}">
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${fmt(f.size)}</div>
          </div>
          <span class="status-badge status-pending" id="status-${i}">Pending</span>
        `;
        fileList.appendChild(item);
      });
    }

    function setStatus(i, type, text) {
      const el = document.getElementById(`status-${i}`);
      if (!el) return;
      el.className = `status-badge status-${type}`;
      el.innerHTML = type === 'working'
        ? `<span class="spinner"></span>${text}`
        : text;
    }

    function updateToolbar() {
      processBtn.disabled = files.length === 0 || running;
      clearBtn.disabled   = files.length === 0 || running;
      countEl.textContent = files.length ? `${files.length} image${files.length > 1 ? 's' : ''}` : '';
    }

    processBtn.addEventListener('click', async () => {
      if (running) return;
      running = true;
      results = [];
      zipBtn.disabled = true;
      updateToolbar();

      for (let i = 0; i < files.length; i++) {
        setStatus(i, 'working', modelReady ? 'Processing…' : 'Loading model…');
        try {
          const blob = await removeBackground(files[i], {
            ...CONFIG,
            progress: (key, current, total) => {
              if (!modelReady && key.startsWith('fetch:') && total > 0) {
                const pct = Math.round(current / total * 100);
                modelProg.style.display = 'block';
                modelBar.style.width = pct + '%';
                modelLabel.textContent = `Downloading model… ${pct}%`;
                setStatus(i, 'working', `Model ${pct}%`);
              }
            },
          });
          modelReady = true;
          modelProg.style.display = 'none';

          const name = files[i].name.replace(/\.[^.]+$/, '.png');
          const url  = URL.createObjectURL(blob);
          results.push({ name, blob, url });

          document.getElementById(`thumb-${i}`).src = url;
          setStatus(i, 'done', '✓ Done');

          // per-file download button
          const item = document.getElementById(`item-${i}`);
          const dlBtn = document.createElement('button');
          dlBtn.className = 'dl-btn';
          dlBtn.textContent = '↓';
          dlBtn.title = 'Download';
          dlBtn.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
          });
          item.appendChild(dlBtn);
        } catch (err) {
          setStatus(i, 'error', '✕ Error');
          console.error(err);
        }
      }

      running = false;
      zipBtn.disabled = results.length === 0;
      updateToolbar();
    });

    zipBtn.addEventListener('click', async () => {
      const zip = new JSZip();
      for (const { name, blob } of results) zip.file(name, blob);
      const out = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(out);
      a.download = 'removed-backgrounds.zip';
      a.click();
    });

    clearBtn.addEventListener('click', () => {
      files = [];
      results = [];
      fileList.innerHTML = '';
      zipBtn.disabled = true;
      updateToolbar();
    });
  </script>
</body>
</html>
