<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #666;
      --green: #4caf7d;
      --red: #e05c5c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    nav { margin-bottom: 32px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    /* Drop zone */
    #dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 20px;
    }
    #dropzone.over, #dropzone:hover { border-color: var(--accent); background: #0f1a2e; }
    #dropzone .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    #dropzone p { color: var(--muted); font-size: 0.9rem; }
    #dropzone strong { color: var(--text); }
    #fileInput { display: none; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #3a7de8; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #444; }
    #count { color: var(--muted); font-size: 0.875rem; margin-left: auto; }

    /* Model progress (first run) */
    #modelProgress {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.875rem;
    }
    #modelProgress .label { color: var(--muted); margin-bottom: 8px; }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.2s;
      width: 0%;
    }

    /* File list */
    #fileList { display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .file-item.done { border-color: #2a3d2e; }
    .file-item.error { border-color: #3d2a2a; }
    .thumb {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 6px;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
      flex-shrink: 0;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
    .status-badge {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-pending  { background: #252525; color: var(--muted); }
    .status-working  { background: #1a2a3a; color: #7ab3f7; }
    .status-done     { background: #1a2e1f; color: var(--green); }
    .status-error    { background: #2e1a1a; color: var(--red); }
    .dl-btn {
      padding: 5px 12px;
      font-size: 0.78rem;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    .dl-btn:hover { border-color: var(--accent); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #7ab3f7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>
