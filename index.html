<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #666;
      --green: #4caf7d;
      --red: #e05c5c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

    /* Drop zone — using <label> so click works natively everywhere */
    #dropzone {
      display: block;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 16px;
    }
    #dropzone.over, #dropzone:hover { border-color: var(--accent); background: #0f1a2e; }
    .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    #dropzone p { color: var(--muted); font-size: 0.9rem; }
    #dropzone strong { color: var(--text); }
    #fileInput { display: none; }

    /* Options */
    .options {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex;
      gap: 28px;
      align-items: center;
      flex-wrap: wrap;
    }
    .opt-group { display: flex; flex-direction: column; gap: 6px; }
    .opt-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
    }
    input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #featherVal { font-size: 0.83rem; color: var(--text); min-width: 24px; }

    /* Model download progress */
    #modelProgress {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.875rem;
    }
    #modelProgress .label { color: var(--muted); margin-bottom: 8px; }
    .bar-wrap { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; width: 0%; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #3a7de8; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #444; }
    #count { color: var(--muted); font-size: 0.875rem; margin-left: auto; }

    /* File list */
    #fileList { display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .file-item.done  { border-color: #2a3d2e; }
    .file-item.error { border-color: #3d2a2a; }
    .thumb {
      width: 48px; height: 48px;
      object-fit: contain;
      border-radius: 6px;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
      flex-shrink: 0;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
    .status-badge {
      font-size: 0.78rem; padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-pending { background: #252525; color: var(--muted); }
    .status-working { background: #1a2a3a; color: #7ab3f7; }
    .status-done    { background: #1a2e1f; color: var(--green); }
    .status-error   { background: #2e1a1a; color: var(--red); }
    .dl-btn {
      padding: 5px 12px; font-size: 0.78rem; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; flex-shrink: 0; font-family: inherit;
    }
    .dl-btn:hover { border-color: var(--accent); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #7ab3f7; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
  </style>
</head>
<body>
  <h1>Background Remover</h1>
  <p class="sub">Runs entirely in your browser — no uploads, no API key</p>

  <label id="dropzone" for="fileInput">
    <div class="drop-icon">🖼️</div>
    <p><strong>Drop images here</strong> or click to browse</p>
    <p style="margin-top:6px;font-size:0.8rem;">PNG, JPG, WebP · Multiple files OK</p>
    <input type="file" id="fileInput" multiple accept="image/*">
  </label>

  <div class="options">
    <div class="opt-group">
      <div class="opt-label">Model</div>
      <select id="modelSelect">
        <option value="small">General (faster)</option>
        <option value="medium" selected>Quality (recommended)</option>
      </select>
    </div>
    <div class="opt-group">
      <div class="opt-label">Edge Feather</div>
      <div class="slider-row">
        <input type="range" id="feather" min="0" max="3" step="0.5" value="1">
        <span id="featherVal">1.0</span>
      </div>
    </div>
    <div class="opt-group" style="justify-content:flex-end;">
      <div class="opt-label">&nbsp;</div>
      <label class="checkbox-label">
        <input type="checkbox" id="enhanceCheck">
        Better edge quality (slower)
      </label>
    </div>
  </div>

  <div id="modelProgress">
    <div class="label" id="modelLabel">Downloading model (first run only)…</div>
    <div class="bar-wrap"><div class="bar-fill" id="modelBar"></div></div>
  </div>

  <div class="toolbar">
    <button class="btn-primary"   id="processBtn" disabled>Remove Backgrounds</button>
    <button class="btn-secondary" id="zipBtn"     disabled>Download All as ZIP</button>
    <button class="btn-ghost"     id="clearBtn"   disabled>Clear</button>
    <span id="count"></span>
  </div>

  <div id="fileList"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/background-removal.browser.esm.js';

    let files = [], results = [], running = false, modelReady = false;

    const fileInput  = document.getElementById('fileInput');
    const dropzone   = document.getElementById('dropzone');
    const fileList   = document.getElementById('fileList');
    const processBtn = document.getElementById('processBtn');
    const zipBtn     = document.getElementById('zipBtn');
    const clearBtn   = document.getElementById('clearBtn');
    const countEl    = document.getElementById('count');
    const modelProg  = document.getElementById('modelProgress');
    const modelBar   = document.getElementById('modelBar');
    const modelLabel = document.getElementById('modelLabel');
    const featherSlider = document.getElementById('feather');
    const featherVal    = document.getElementById('featherVal');
    const modelSelect   = document.getElementById('modelSelect');
    const enhanceCheck  = document.getElementById('enhanceCheck');

    featherSlider.addEventListener('input', () => {
      featherVal.textContent = parseFloat(featherSlider.value).toFixed(1);
    });

    // Drag & drop (label handles click natively)
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('over');
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function fmt(b) {
      return b < 1048576 ? (b / 1024).toFixed(0) + ' KB' : (b / 1048576).toFixed(1) + ' MB';
    }

    function addFiles(incoming) {
      files = [...files, ...incoming.filter(f => f.type.startsWith('image/'))];
      results = [];
      renderList();
      updateToolbar();
    }

    function renderList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const item = document.createElement('div');
        item.className = 'file-item';
        item.id = `item-${i}`;
        item.innerHTML = `
          <img class="thumb" src="${url}" id="thumb-${i}">
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${fmt(f.size)}</div>
          </div>
          <span class="status-badge status-pending" id="status-${i}">Pending</span>
        `;
        fileList.appendChild(item);
      });
    }

    function setStatus(i, type, text) {
      const el = document.getElementById(`status-${i}`);
      if (!el) return;
      el.className = `status-badge status-${type}`;
      el.innerHTML = type === 'working' ? `<span class="spinner"></span>${text}` : text;
    }

    function updateToolbar() {
      processBtn.disabled = files.length === 0 || running;
      clearBtn.disabled   = files.length === 0 || running;
      countEl.textContent = files.length ? `${files.length} image${files.length > 1 ? 's' : ''}` : '';
    }

    async function enhanceAlpha(blob) {
      const img = await createImageBitmap(blob);
      const { width, height } = img;
      const c = new OffscreenCanvas(width, height);
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, width, height);
      for (let i = 0; i < data.data.length; i += 4) {
        let a = data.data[i + 3] / 255;
        // S-curve: push semi-transparent pixels toward fully opaque or transparent
        a = a < 0.5 ? 2 * a * a : 1 - Math.pow(-2 * a + 2, 2) / 2;
        data.data[i + 3] = Math.round(a * 255);
      }
      ctx.putImageData(data, 0, 0);
      return c.convertToBlob({ type: 'image/png' });
    }

    async function featherAlpha(blob, radius) {
      if (radius === 0) return blob;
      const img = await createImageBitmap(blob);
      const { width, height } = img;

      const base = new OffscreenCanvas(width, height);
      const bctx = base.getContext('2d');
      bctx.drawImage(img, 0, 0);
      const data = bctx.getImageData(0, 0, width, height);

      // alpha → greyscale canvas
      const ac = new OffscreenCanvas(width, height);
      const actx = ac.getContext('2d');
      const ad = actx.createImageData(width, height);
      for (let i = 0; i < data.data.length; i += 4) {
        ad.data[i] = ad.data[i+1] = ad.data[i+2] = data.data[i+3];
        ad.data[i+3] = 255;
      }
      actx.putImageData(ad, 0, 0);

      // blur the greyscale alpha
      const bc = new OffscreenCanvas(width, height);
      const bctx2 = bc.getContext('2d');
      bctx2.filter = `blur(${radius}px)`;
      bctx2.drawImage(ac, 0, 0);
      const bd = bctx2.getImageData(0, 0, width, height);

      // write blurred alpha back
      for (let i = 0; i < data.data.length; i += 4) {
        data.data[i+3] = bd.data[i];
      }
      const rc = new OffscreenCanvas(width, height);
      rc.getContext('2d').putImageData(data, 0, 0);
      return rc.convertToBlob({ type: 'image/png' });
    }

    processBtn.addEventListener('click', async () => {
      if (running) return;
      running = true;
      results = [];
      zipBtn.disabled = true;
      updateToolbar();

      const model   = modelSelect.value;
      const feather = parseFloat(featherSlider.value);
      const enhance = enhanceCheck.checked;
      const config  = {
        publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/',
        model,
        output: { format: 'image/png', quality: 1 },
      };

      for (let i = 0; i < files.length; i++) {
        setStatus(i, 'working', modelReady ? 'Processing…' : 'Loading model…');
        try {
          let blob = await removeBackground(files[i], {
            ...config,
            progress: (key, current, total) => {
              if (!modelReady && key.startsWith('fetch:') && total > 0) {
                const pct = Math.round(current / total * 100);
                modelProg.style.display = 'block';
                modelBar.style.width = pct + '%';
                modelLabel.textContent = `Downloading model… ${pct}%`;
                setStatus(i, 'working', `Model ${pct}%`);
              }
            },
          });

          modelReady = true;
          modelProg.style.display = 'none';

          if (enhance) {
            setStatus(i, 'working', 'Enhancing edges…');
            blob = await enhanceAlpha(blob);
          }
          if (feather > 0) {
            setStatus(i, 'working', 'Feathering…');
            blob = await featherAlpha(blob, feather);
          }

          const name = files[i].name.replace(/\.[^.]+$/, '.png');
          const url  = URL.createObjectURL(blob);
          results.push({ name, blob, url });

          document.getElementById(`thumb-${i}`).src = url;
          document.getElementById(`item-${i}`).classList.add('done');
          setStatus(i, 'done', '✓ Done');

          const dlBtn = document.createElement('button');
          dlBtn.className = 'dl-btn';
          dlBtn.textContent = '↓';
          dlBtn.title = 'Download';
          dlBtn.addEventListener('click', () => Object.assign(document.createElement('a'), { href: url, download: name }).click());
          document.getElementById(`item-${i}`).appendChild(dlBtn);
        } catch (err) {
          setStatus(i, 'error', '✕ Error');
          console.error(err);
        }
      }

      running = false;
      zipBtn.disabled = results.length === 0;
      updateToolbar();
    });

    zipBtn.addEventListener('click', async () => {
      const zip = new JSZip();
      for (const { name, blob } of results) zip.file(name, blob);
      const out = await zip.generateAsync({ type: 'blob' });
      Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(out),
        download: 'removed-backgrounds.zip',
      }).click();
    });

    clearBtn.addEventListener('click', () => {
      files = []; results = [];
      fileList.innerHTML = '';
      zipBtn.disabled = true;
      updateToolbar();
    });
  </script>
</body>
</html>
